<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</head>

<body>
    <nav class="navbar" style="background: #0f172a;">
        <div class="logo">
            <i class="fa-solid fa-user-gear"></i> Admin Portal
        </div>
        <div class="nav-user">
            <div class="user-badge" style="background: rgba(255,255,255,0.1);">
                <div class="user-avatar" style="background: linear-gradient(135deg, #6366f1, #8b5cf6);">A</div>
                <span id="adminNameDisplay" style="color: #f5f5dc;">Super Admin</span>
            </div>
            <button class="btn-logout" onclick="logout()">
                <i class="fa-solid fa-power-off"></i> Logout
            </button>
        </div>
    </nav>

    <main class="main-content">
        <div class="flex-between" style="margin-bottom: 2rem;">
            <div>
                <h1 style="font-size: 1.8rem; font-weight: 700;">System Overview</h1>
                <p class="text-muted">Global analytics and user management.</p>
            </div>
            <button class="btn-primary" style="width: auto; padding: 0.75rem 1.5rem;" onclick="loadAdminDashboard()">
                <i class="fa-solid fa-rotate-right"></i> Refresh Data
            </button>
        </div>

        <!-- KPI Cards -->
        <div class="grid-3" style="margin-bottom: 2rem;">
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Total Complaints</h3>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="stat-icon" style="background: rgba(150, 63, 63, 0.2); color: var(--primary);">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Critical Issues</h3>
                    <div class="value" id="highCount" style="color: var(--urgency-high);">0</div>
                </div>
                <div class="stat-icon" style="background: rgba(239, 68, 68, 0.2); color: var(--urgency-high);">
                    <i class="fa-solid fa-triangle-exclamation"></i>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-info">
                    <h3>Registered Users</h3>
                    <div class="value" id="userCount">0</div>
                </div>
                <div class="stat-icon" style="background: rgba(245, 158, 11, 0.2); color: #f59e0b;">
                    <i class="fa-solid fa-users"></i>
                </div>
            </div>
        </div>

        <!-- Management Section tabs -->
        <div style="margin-bottom: 1.5rem; display: flex; gap: 10px;">
            <button class="btn-primary" onclick="showSection('complaints')" id="btnComp"
                style="width: auto; padding: 0.6rem 1.5rem; font-size: 0.95rem; color: #1e3a8a; font-weight: 700; background: var(--primary);">All
                Complaints</button>
            <button class="btn-primary" onclick="showSection('student-complaints')" id="btnStudentComp"
                style="width: auto; padding: 0.6rem 1.5rem; font-size: 0.95rem; color: #1e3a8a; font-weight: 700; background: #fff; border: 1px solid var(--border);">Student
                Complaints</button>
            <button class="btn-primary" onclick="showSection('users')" id="btnUsers"
                style="width: auto; padding: 0.6rem 1.5rem; font-size: 0.95rem; color: #1e3a8a; font-weight: 700; background: #fff; border: 1px solid var(--border);">User
                Management</button>
        </div>

        <!-- All Complaints Section -->
        <div id="section-complaints">
            <div class="glass" style="border-radius: 16px; padding: 2rem;">
                <h2 style="margin-bottom: 1rem; color: #1e3a8a;">All System Complaints</h2>
                <div id="complaintsList">
                    <div style="text-align: center; padding: 2rem;"><i class="fa-solid fa-spinner fa-spin"></i>
                        Loading...</div>
                </div>
            </div>
        </div>

        <!-- Student Complaints Section -->
        <div id="section-student-complaints" style="display: none;">
            <div class="glass" style="border-radius: 16px; padding: 2rem;">
                <h2 style="margin-bottom: 1rem; color: #1e3a8a;">Student Behaviour Complaints</h2>
                <div id="studentComplaintsList">
                    <div style="text-align: center; padding: 2rem;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>
                </div>
            </div>
        </div>

        <!-- User Management Section -->
        <div id="section-users" style="display: none;">
            <div class="glass" style="border-radius: 16px; padding: 2rem;">
                <div class="flex-between" style="margin-bottom: 1rem;">
                    <h2 style="color: #1e3a8a;">User Management</h2>
                    <button class="btn-primary" onclick="document.getElementById('addUserForm').style.display='block'"
                        style="width:auto; font-size: 0.9rem;">
                        <i class="fa-solid fa-plus"></i> Add User
                    </button>
                </div>

                <!-- Add User Form -->
                <div id="addUserForm"
                    style="display:none; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; border: 1px solid var(--border);">
                    <h3 style="margin-bottom: 1rem;">Add New User</h3>
                    <div
                        style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 10px; align-items: end;">
                        <div>
                            <label class="form-label" style="font-size: 0.8rem;">Username</label>
                            <input type="text" id="newUsername" class="form-input" placeholder="e.g. warden3">
                        </div>
                        <div>
                            <label class="form-label" style="font-size: 0.8rem;">Name</label>
                            <input type="text" id="newName" class="form-input" placeholder="Full Name">
                        </div>
                        <div>
                            <label class="form-label" style="font-size: 0.8rem;">Role</label>
                            <select id="newRole" class="form-select" onchange="toggleHostelField()">
                                <option value="Student">Student</option>
                                <option value="Warden">Warden</option>
                                <option value="Admin">Admin</option>
                            </select>
                        </div>
                        <div id="hostelField">
                            <label class="form-label" style="font-size: 0.8rem;">Hostel</label>
                            <select id="newHostel" class="form-select">
                                <option value="C1">C1</option>
                                <option value="C2">C2</option>
                                <option value="C3">C3</option>
                                <option value="C4">C4</option>
                                <option value="C5">C5</option>
                                <option value="C6">C6</option>
                                <option value="C7">C7</option>
                                <option value="C8">C8</option>
                                <option value="C9">C9</option>
                            </select>
                        </div>
                        <button onclick="addUser()" class="btn-primary" style="height: 48px;">Add</button>
                    </div>
                </div>

                <table style="width: 100%; text-align: left; border-collapse: collapse; color: var(--text);">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--border);">
                            <th style="padding: 10px;">Name</th>
                            <th style="padding: 10px;">Username</th>
                            <th style="padding: 10px;">Role</th>
                            <th style="padding: 10px;">Hostel</th>
                            <th style="padding: 10px;">Action</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

    <script>
        const user = checkAuth('Admin');
        if (user) document.getElementById('adminNameDisplay').innerText = user.name || 'Admin';

        function showSection(sec) {
            document.getElementById('section-complaints').style.display = sec === 'complaints' ? 'block' : 'none';
            document.getElementById('section-users').style.display = sec === 'users' ? 'block' : 'none';
            document.getElementById('section-student-complaints').style.display = sec === 'student-complaints' ? 'block' : 'none';

            // Toggle active styles on buttons
            const btns = {
                'complaints': 'btnComp',
                'users': 'btnUsers',
                'student-complaints': 'btnStudentComp'
            };

            Object.keys(btns).forEach(key => {
                const b = document.getElementById(btns[key]);
                if (key === sec) {
                    b.style.background = 'var(--primary)';
                    b.style.border = 'none';
                } else {
                    b.style.background = '#fff';
                    b.style.border = '1px solid var(--border)';
                }
                b.style.color = '#1e3a8a';
            });

            if (sec === 'student-complaints') {
                loadStudentComplaints();
            }
        }

        async function loadStudentComplaints() {
            const container = document.getElementById('studentComplaintsList');
            container.innerHTML = '<div style="text-align: center; padding: 2rem;"><i class="fa-solid fa-spinner fa-spin"></i> Loading...</div>';

            try {
                const res = await fetch('http://localhost:3000/api/admin/student-complaints');
                const complaints = await res.json();
                renderStudentComplaints(complaints);
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--danger);">Failed to load student complaints.</div>';
            }
        }

        function renderStudentComplaints(complaints) {
            const container = document.getElementById('studentComplaintsList');
            container.innerHTML = '';

            if (complaints.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">No student behaviour complaints registered.</div>';
                return;
            }

            complaints.forEach(c => {
                const item = document.createElement('div');
                item.className = 'complaint-card';
                item.style.borderLeft = '4px solid var(--warning)';

                item.innerHTML = `
                    <div class="complaint-header">
                        <div>
                            <span class="badge" style="background: var(--warning); color: #000; font-weight: 700;">STUDENT BEHAVIOUR</span>
                            <span class="status-badge" style="background: rgba(99, 102, 241, 0.1); color: var(--primary);">${c.status}</span>
                        </div>
                        <span class="text-muted text-sm">${new Date(c.createdAt).toLocaleDateString()}</span>
                    </div>
                    <div class="complaint-body">${c.complaint_text}</div>
                    <div class="complaint-meta">
                        <strong>Target Student:</strong> ${c.student_name} (${c.student_id}) <br>
                        <strong>Reporter:</strong> ${c.warden_id}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function toggleHostelField() {
            const role = document.getElementById('newRole').value;
            const field = document.getElementById('hostelField');
            if (role === 'Admin') field.style.opacity = '0.3';
            else field.style.opacity = '1';
        }

        async function loadAdminDashboard() {
            try {
                // 1. Get Stats (as Admin)
                const statsRes = await fetch('http://localhost:3000/api/stats?role=Admin'); // No filtering
                const stats = await statsRes.json();

                document.getElementById('totalCount').innerText = stats.total;
                document.getElementById('highCount').innerText = stats.byUrgency['High'] || 0;

                // 2. Get Users
                await loadUsers();

                // 3. Get Complaints
                const compRes = await fetch('http://localhost:3000/api/complaints?role=Admin');
                const complaints = await compRes.json();
                renderComplaints(complaints);

            } catch (err) {
                console.error(err);
            }
        }

        async function loadUsers() {
            const res = await fetch('http://localhost:3000/api/users');
            const users = await res.json();

            document.getElementById('userCount').innerText = users.length;

            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            users.forEach(u => {
                const tr = document.createElement('tr');
                tr.style.borderBottom = '1px solid rgba(255,255,255,0.05)';
                tr.innerHTML = `
                    <td style="padding: 10px;">${u.name || '-'}</td>
                    <td style="padding: 10px; font-family: monospace;">${u.username}</td>
                    <td style="padding: 10px;"><span class="badge ${u.role === 'Admin' ? 'high' : 'low'}">${u.role}</span></td>
                    <td style="padding: 10px;">${u.hostel || '-'}</td>
                    <td style="padding: 10px;">
                        ${u.username !== 'admin' ?
                        `<button onclick="deleteUser('${u.username}')" style="background: transparent; border: 1px solid var(--danger); color: var(--danger); padding: 4px 8px; border-radius: 4px; cursor: pointer;">
                                <i class="fa-solid fa-trash"></i>
                            </button>` : '<span class="text-muted">Protected</span>'
                    }
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        async function addUser() {
            const username = document.getElementById('newUsername').value;
            const name = document.getElementById('newName').value;
            const role = document.getElementById('newRole').value;
            const hostel = document.getElementById('newHostel').value;

            if (!username) return alert('Username required');

            const res = await fetch('http://localhost:3000/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, name, role, hostel })
            });

            const data = await res.json();
            if (data.success) {
                alert('User added!');
                document.getElementById('newUsername').value = '';
                document.getElementById('newName').value = '';
                loadUsers();
            } else {
                alert(data.message);
            }
        }

        async function deleteUser(username) {
            if (!confirm('Are you sure you want to remove ' + username + '?')) return;

            const res = await fetch('http://localhost:3000/api/users/' + username, { method: 'DELETE' });
            if (res.ok) loadUsers();
        }

        function getDueDateBadge(c) {
            if (!c.dueDate) return '';
            const due = new Date(c.dueDate);
            const now = new Date();
            const isResolved = c.status === 'Resolved';
            const isOnTime = isResolved || due >= now;
            const badgeClass = isOnTime ? 'on-time' : 'overdue';
            const label = due.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            return `<span class="due-date-badge ${badgeClass}"><i class="fa-regular fa-calendar-check"></i> ${label}</span>`;
        }

        async function extendDeadline(complaintId, currentDueDateStr) {
            // Build date picker id
            const pickerId = `picker-${complaintId}`;
            let picker = document.getElementById(pickerId);

            if (picker) {
                // Already open — toggle off
                picker.parentElement.remove();
                return;
            }

            // Determine min date (tomorrow)
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const minDate = tomorrow.toISOString().split('T')[0];

            // Default value = current due date (if any)
            let defaultVal = '';
            if (currentDueDateStr) {
                const d = new Date(currentDueDateStr);
                if (!isNaN(d)) defaultVal = d.toISOString().split('T')[0];
            }

            // Inject inline picker under the badge row
            const wrap = document.createElement('div');
            wrap.className = 'deadline-extend-wrap';
            wrap.id = `wrap-${complaintId}`;
            wrap.innerHTML = `
                <input type="date" id="${pickerId}" min="${minDate}" value="${defaultVal}" style="border-radius:8px; border:1px solid #cbd5e1; padding:4px 8px; font-size:0.8rem;">
                <button onclick="submitExtendDeadline('${complaintId}')" style="padding:4px 10px; border-radius:8px; background:#6366f1; color:#fff; border:none; cursor:pointer; font-weight:600; font-size:0.8rem;">Set</button>
                <button onclick="document.getElementById('wrap-${complaintId}').remove()" style="padding:4px 8px; border-radius:8px; background:#f1f5f9; color:#64748b; border:none; cursor:pointer; font-size:0.8rem;">Cancel</button>
            `;

            // Insert after the btn that triggered this
            const btn = document.getElementById(`extend-btn-${complaintId}`);
            if (btn && btn.parentElement) {
                btn.parentElement.insertAdjacentElement('afterend', wrap);
            }
        }

        async function submitExtendDeadline(complaintId) {
            const picker = document.getElementById(`picker-${complaintId}`);
            if (!picker || !picker.value) {
                alert('Please select a valid date.');
                return;
            }

            try {
                const res = await fetch(`http://localhost:3000/api/complaints/${complaintId}/extend-deadline`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ dueDate: picker.value, role: 'Admin' })
                });
                const data = await res.json();
                if (data.success) {
                    // Clean up picker
                    const wrap = document.getElementById(`wrap-${complaintId}`);
                    if (wrap) wrap.remove();
                    // Reload to show updated badge
                    loadAdminDashboard();
                } else {
                    alert(data.message || 'Failed to extend deadline.');
                }
            } catch (err) {
                console.error(err);
                alert('Network error while extending deadline.');
            }
        }

        function renderComplaints(complaints) {
            const container = document.getElementById('complaintsList');
            container.innerHTML = '';

            if (complaints.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 2rem; color: var(--text-muted);">No complaints.</div>';
                return;
            }

            complaints.forEach(c => {
                const item = document.createElement('div');
                item.className = 'complaint-card';
                // Styles reuse
                const urgencyColor = c.urgency === 'High' ? 'var(--urgency-high)' :
                    c.urgency === 'Medium' ? 'var(--urgency-medium)' : 'var(--urgency-low)';
                item.style.borderLeftColor = urgencyColor;

                // Prepare Comments HTML (Initially Hidden)
                let commentsHtml = '';
                if (c.comments && c.comments.length > 0) {
                    c.comments.forEach(com => {
                        commentsHtml += `
                            <div id="comment-${com.id || com._id}" style="background: #f8fafc; padding: 0.5rem; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.9rem; border: 1px solid #e2e8f0;">
                                <div style="display:flex; justify-content:space-between; margin-bottom:0.25rem;">
                                    <strong>${com.user_name} <span style="font-weight:400; font-size: 0.8rem; color:#64748b;">(${com.role})</span></strong>
                                    <span class="text-muted" style="font-size:0.8rem;">${new Date(com.created_at).toLocaleDateString()}</span>
                                </div>
                                <div style="color: #334155; display: flex; justify-content: space-between; align-items: center;">
                                    <span>${com.comment_text}</span>
                                    <button onclick="deleteComment('${c.id}', '${com.id || com._id}')" style="background:none; border:none; color:var(--danger); cursor:pointer; font-size:0.8rem; padding:0; margin-left: 10px;">
                                        <i class="fa-solid fa-trash-can"></i> Delete
                                    </button>
                                </div>
                            </div>
                        `;
                    });
                } else {
                    commentsHtml = '<div class="text-muted" style="font-style:italic;">No comments yet.</div>';
                }

                item.innerHTML = `
                    <div class="complaint-top" style="position: relative;">
                        <div style="display:flex; gap:10px; align-items:center;">
                            <select onchange="updatePriority('${c.id}', this.value)" class="badge ${c.urgency.toLowerCase()}" style="appearance: none; border: none; outline: none; cursor: pointer; padding-right: 20px; font-weight: 600;">
                                <option value="High" ${c.urgency === 'High' ? 'selected' : ''} style="background: white; color: black;">High ▼</option>
                                <option value="Medium" ${c.urgency === 'Medium' ? 'selected' : ''} style="background: white; color: black;">Medium ▼</option>
                                <option value="Low" ${c.urgency === 'Low' ? 'selected' : ''} style="background: white; color: black;">Low ▼</option>
                            </select>
                            <span style="font-weight:600; font-size: 0.9rem;">${c.category}</span>
                            <span class="badge" style="background: #334155;">${c.hostel}</span>
                        </div>
                        <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                            ${getDueDateBadge(c)}
                            <button id="extend-btn-${c.id}" onclick="extendDeadline('${c.id}', '${c.dueDate || ''}')" title="Extend Deadline" style="display:inline-flex; align-items:center; gap:4px; padding:5px 11px; border-radius:20px; border:1px solid #6366f1; color:#6366f1; background:transparent; cursor:pointer; font-weight:600; font-size:0.75rem; white-space:nowrap; transition:all 0.2s;" onmouseover="this.style.background='#6366f1'; this.style.color='#fff'" onmouseout="this.style.background='transparent'; this.style.color='#6366f1'">
                                <i class="fa-regular fa-calendar-plus"></i> Extend Deadline
                            </button>
                            <span class="text-muted text-sm">${new Date(c.timestamp).toLocaleDateString()}</span>
                        </div>
                    </div>
                    <div class="complaint-body">${c.description}</div>
                    <div class="complaint-meta">
                        Reported by: ${c.studentName} <br>
                        Location: Hostel ${c.hostel}, Floor ${c.floor}, Room ${c.roomNumber || 'N/A'}
                        ${c.type === 'Student Behaviour' ? `
                            <div style="margin-top: 8px; padding: 8px; background: rgba(245, 158, 11, 0.1); border-radius: 6px; border-left: 3px solid var(--warning);">
                                <strong style="color: var(--warning); font-size: 0.8rem; display: block; margin-bottom: 2px;">REPORTED STUDENT:</strong>
                                <span style="font-size: 0.9rem;"><strong>Name:</strong> ${c.targetStudentName} | <strong>ID:</strong> ${c.targetStudentId}</span>
                            </div>
                        ` : ''}
                    </div>
                    
                     <!-- View Comments Toggle -->
                    <div style="margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #f1f5f9;">
                         <button onclick="document.getElementById('comments-${c.id}').classList.toggle('hidden')" 
                            style="background:none; border:none; color:var(--primary); cursor:pointer; font-weight:600; padding:0; display:flex; align-items:center; gap:0.5rem;">
                            <i class="fa-regular fa-comments"></i> View Comments (${c.comments ? c.comments.length : 0})
                         </button>
                         <div id="comments-${c.id}" class="hidden" style="margin-top: 1rem; padding: 1rem; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;">
                            ${commentsHtml}
                         </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        async function deleteComment(complaintId, commentId) {
            if (!confirm('Are you sure you want to delete this comment?')) return;

            try {
                const res = await fetch(`http://localhost:3000/api/complaints/${complaintId}/comment/${commentId}?role=Admin&userId=${user._id}`, {
                    method: 'DELETE'
                });

                const data = await res.json();
                if (data.success) {
                    // Remove from UI dynamically
                    document.getElementById(`comment-${commentId}`).remove();
                    // Update count in UI if visible somewhere, but here it's just in the toggle button
                    // For simplicity, we can let it be or refresh complaints if needed.
                    // But the requirement says "Do NOT reload entire page."
                } else {
                    alert(data.message);
                }
            } catch (err) {
                console.error(err);
                alert('Failed to delete comment');
            }
        }

        async function updatePriority(complaintId, newPriority) {
            try {
                const res = await fetch(`http://localhost:3000/api/complaints/${complaintId}/priority`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ urgency_level: newPriority, role: 'Admin' })
                });

                const data = await res.json();
                if (data.success) {
                    loadAdminDashboard(); // Refresh to update colors comprehensively
                } else {
                    alert(data.message || 'Failed to update priority');
                }
            } catch (err) {
                console.error(err);
                alert('A network error occurred while updating priority');
            }
        }

        loadAdminDashboard();
    </script>
</body>

</html>
